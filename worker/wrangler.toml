name = "breathing-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "breathing"
database_id = "e7a6ad81-92bf-4402-ba88-39c7f01e2c20"
migrations_dir = "migrations"

[vars]
BUDGET_ENABLED = "true"
# Workers Free の日次 10 万 req より少し手前で止める
BUDGET_DAILY_REQUESTS = "90000"
# Workers Paid の月次 1,000 万 req より手前
BUDGET_MONTHLY_REQUESTS = "9000000"
STATIC_ONLY_MODE = "false"
PRESENCE_WINDOW_SEC = "300"
WORDS_RETENTION_SEC = "31536000"
SESSION_VISITS_RETENTION_SEC = "31536000"
ALLOWED_ORIGINS = "https://breathing-4k7.pages.dev"
IP_THROTTLE_WINDOW_SEC = "60"
IP_THROTTLE_MAX = "120"
MAX_BODY_BYTES = "1024"

# ADMIN_TOKEN は wrangler secret put ADMIN_TOKEN で設定

# Workers Cron（Free 枠可）— visit 確定・期限削除。日次 ~288 回
[triggers]
crons = ["*/5 * * * *"]

[dev]
port = 8787
local_protocol = "http"
