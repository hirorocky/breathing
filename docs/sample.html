<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>深呼吸している場所</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-deep: oklch(0.16 0.006 60);
    --bg-mid:  oklch(0.20 0.008 60);
    --bg-soft: oklch(0.24 0.010 60);
    --ink:     oklch(0.86 0.006 70);
    --ink-mute: oklch(0.62 0.008 70);
    --ink-faint: oklch(0.40 0.008 70);
    --ember:   oklch(0.72 0.040 50);
    --ember-soft: oklch(0.55 0.030 50);

    --serif: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --mono:  "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

    /* breath state, updated from JS each frame */
    --bx: 1;   /* x-scale */
    --by: 1;   /* y-scale */
    --bo: 0.5; /* opacity factor 0..1 */
    --bw: 0;   /* warp -1..1 */
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    background: var(--bg-deep);
    color: var(--ink);
    font-family: var(--serif);
    font-feature-settings: "palt" 1;
    overflow: hidden;
    cursor: default;
    text-wrap: pretty;
    transition: background 4s ease, color 4s ease;
  }

  /* slow body wash, driven by the same breath state */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 50%, var(--bg-soft) 0%, transparent 70%),
      radial-gradient(ellipse 60% 40% at 30% 80%, var(--bg-mid) 0%, transparent 65%);
    opacity: calc(0.32 + var(--bo) * 0.25);
    pointer-events: none;
    z-index: 0;
    transform: scale(calc(1 + var(--bo) * 0.04));
    transition: transform 80ms linear, opacity 80ms linear;
  }
  body::after {
    content: "";
    position: fixed;
    inset: -10%;
    pointer-events: none;
    z-index: 1;
    opacity: 0.05;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.9  0 0 0 0 0.9  0 0 0 0 0.9  0 0 0 0.7 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* full-screen stage, no scroll */
  .stage {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: grid;
    place-items: center;
  }

  /* ───────────── breathing form (3 nested layers) ───────────────────── */
  .breath {
    position: relative;
    width: min(620px, 72vmin);
    height: min(620px, 72vmin);
    transform: scale(var(--bx), var(--by));
    will-change: transform;
  }
  /* outer: a clear thin line circle */
  .breath .ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 0.5px solid var(--ink-mute);
    opacity: calc(0.30 + var(--bo) * 0.50);
    transform: scale(calc(0.90 + var(--bo) * 0.10));
    will-change: transform, opacity;
  }
  /* middle: a soft, blurred halo */
  .breath .glow {
    position: absolute;
    inset: 8%;
    border-radius: 50%;
    background: radial-gradient(
      circle at 50% 50%,
      oklch(0.80 0.050 50 / 0.55) 0%,
      oklch(0.65 0.040 50 / 0.22) 40%,
      oklch(0.45 0.025 45 / 0.06) 70%,
      transparent 85%
    );
    filter: blur(calc(14px + var(--bo) * 14px));
    opacity: calc(0.55 + var(--bo) * 0.45);
    transform: scale(calc(0.78 + var(--bo) * 0.22));
    will-change: transform, opacity, filter;
  }
  /* inner: a small bright core */
  .breath .core {
    position: absolute;
    left: 50%; top: 50%;
    width:  calc(10px + var(--bo) * 6px);
    height: calc(10px + var(--bo) * 6px);
    margin-left: calc(-5px - var(--bo) * 3px);
    margin-top:  calc(-5px - var(--bo) * 3px);
    border-radius: 50%;
    background: var(--ember);
    box-shadow: 0 0 calc(18px + var(--bo) * 30px) var(--ember);
    will-change: width, height, margin, box-shadow;
  }

  /* ───────────── ambient presence orbs ─────────────────────────────── */
  .orbs {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }
  .orb {
    position: absolute;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ink-faint);
    transform: translate(-50%, -50%) scale(var(--s, 1));
    opacity: var(--o, 0.4);
    transition: transform 1.2s ease, opacity 1.2s ease;
    will-change: transform, opacity;
  }
  .orb.you { background: var(--ember); box-shadow: 0 0 12px var(--ember); }

  /* ───────────── drifting sediment words ───────────────────────────── */
  .driftfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }
  .driftword {
    position: absolute;
    font-family: var(--serif);
    font-size: 13px;
    line-height: 1.6;
    color: var(--ink-faint);
    letter-spacing: 0.08em;
    white-space: nowrap;
    opacity: 0;
    animation: driftIn 6s ease forwards;
    will-change: transform, opacity;
  }
  @keyframes driftIn {
    0%   { opacity: 0; }
    20%  { opacity: 0.55; }
    80%  { opacity: 0.45; }
    100% { opacity: 0; transform: translate(var(--dx, 0), var(--dy, -40px)); }
  }

  /* ───────────── corner chrome ──────────────────────────────────────── */
  .chrome {
    position: fixed;
    top: 22px; left: 24px;
    z-index: 30;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    pointer-events: none;
    transform: scale(var(--dc-inv-zoom,1));
    transform-origin: top left;
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  .chrome .dot {
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--ember-soft);
    border-radius: 50%;
    opacity: calc(0.35 + var(--bo) * 0.5);
    transform: scale(calc(0.85 + var(--bo) * 0.5));
  }
  .chrome .title {
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  body.verbose .chrome .title { opacity: 1; }

  .chrome-right {
    position: fixed;
    top: 22px; right: 24px;
    z-index: 30;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    text-align: right;
    transform: scale(var(--dc-inv-zoom,1));
    transform-origin: top right;
    display: inline-flex;
    align-items: center;
    gap: 9px;
  }
  .presence-dots { display: inline-flex; gap: 5px; }
  .presence-dots .pd {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--ink-faint);
    opacity: var(--o, 0.5);
    transform: scale(var(--s, 1));
    transition: transform 1s ease, opacity 1s ease;
  }
  .presence-dots .pd.you { background: var(--ember); }
  .chrome-right .label {
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  body.verbose .chrome-right .label { opacity: 1; }

  /* ───────────── help toggle ─────────────────────────────────────────── */
  .help-toggle {
    position: fixed;
    bottom: 28px; left: 28px;
    z-index: 100;
    appearance: none;
    background: oklch(from var(--bg-deep) l c h / 0.5);
    -webkit-backdrop-filter: blur(8px);
    backdrop-filter: blur(8px);
    border: 0.5px solid var(--ink-mute);
    color: var(--ink-mute);
    width: 34px; height: 34px;
    border-radius: 50%;
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1;
    padding: 0;
    cursor: default;
    transition: color 0.6s ease, border-color 0.6s ease, background 0.6s ease, transform 0.4s ease;
    transform: scale(var(--dc-inv-zoom,1));
    transform-origin: bottom left;
  }
  .help-toggle:hover {
    color: var(--ink);
    border-color: var(--ink);
    transform: scale(calc(var(--dc-inv-zoom,1) * 1.06));
  }
  body.verbose .help-toggle {
    color: var(--bg-deep);
    background: var(--ember-soft);
    border-color: var(--ember-soft);
  }

  /* ───────────── help overlay ────────────────────────────────────────── */
  .help-overlay {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: grid;
    place-items: center;
    background: oklch(0.16 0.006 60 / 0.55);
    -webkit-backdrop-filter: blur(14px);
    backdrop-filter: blur(14px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.9s ease;
  }
  .help-overlay.open { opacity: 1; pointer-events: auto; }
  .help-card {
    max-width: 520px;
    padding: 56px 56px 48px;
    color: var(--ink);
    transform: translateY(8px);
    opacity: 0;
    transition: transform 1.4s cubic-bezier(.2,.7,.2,1) 0.1s,
                opacity   1.4s ease 0.1s;
  }
  .help-overlay.open .help-card { transform: translateY(0); opacity: 1; }
  .help-eyebrow {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--ember-soft);
    margin-bottom: 22px;
  }
  .help-title {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: 0.12em;
    line-height: 1.8;
    margin-bottom: 36px;
  }
  .help-body p {
    font-size: 14px;
    line-height: 2.2;
    letter-spacing: 0.08em;
    color: var(--ink-mute);
    margin: 0 0 22px;
  }
  .help-body p.lead {
    color: var(--ink);
    font-size: 15px;
  }
  .help-body ul {
    list-style: none;
    margin: 0 0 28px;
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .help-body li {
    font-size: 13px;
    letter-spacing: 0.10em;
    color: var(--ink-mute);
    padding-left: 18px;
    position: relative;
    line-height: 2;
  }
  .help-body li::before {
    content: "";
    position: absolute;
    left: 0; top: 0.95em;
    width: 8px; height: 0.5px;
    background: var(--ember-soft);
  }
  .help-foot {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    margin-top: 8px;
  }

  /* ───────────── place-a-word (keyboard-revealed) ───────────────────── */
  .word-bar {
    position: fixed;
    left: 50%;
    bottom: 60px;
    transform: translateX(-50%) translateY(8px) scale(var(--dc-inv-zoom,1));
    transform-origin: bottom center;
    z-index: 35;
    width: min(560px, calc(100vw - 80px));
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .word-bar.open {
    opacity: 1;
    pointer-events: auto;
    transform: translateX(-50%) translateY(0) scale(var(--dc-inv-zoom,1));
  }
  .word-input {
    width: 100%;
    background: transparent;
    border: 0;
    border-bottom: 0.5px solid var(--ink-faint);
    color: var(--ink);
    font-family: var(--serif);
    font-size: 18px;
    line-height: 1.8;
    letter-spacing: 0.08em;
    padding: 6px 4px 10px;
    outline: none;
    text-align: center;
    caret-color: var(--ember);
    transition: border-color 1s ease;
  }
  .word-input:focus { border-color: var(--ember-soft); }
  .word-hint {
    margin-top: 10px;
    text-align: center;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
  }
  .word-hint .esc { opacity: 0.6; }

  /* the bottom prompt that suggests typing */
  .type-hint {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) scale(var(--dc-inv-zoom,1));
    transform-origin: bottom center;
    z-index: 30;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--ink-faint);
    opacity: 0;
    transition: opacity 1.6s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  body.verbose .type-hint { opacity: 0.55; }
  .word-bar.open ~ .type-hint { opacity: 0 !important; }

  /* selection */
  ::selection { background: var(--ember-soft); color: var(--bg-deep); }

  /* atmospheres */
  html[data-atmos="dusk"] {
    --bg-deep: oklch(0.22 0.018 40);
    --bg-mid:  oklch(0.26 0.022 40);
    --bg-soft: oklch(0.30 0.024 35);
    --ink:     oklch(0.88 0.012 55);
    --ink-mute: oklch(0.66 0.014 55);
    --ink-faint: oklch(0.46 0.014 55);
    --ember:   oklch(0.74 0.060 45);
    --ember-soft: oklch(0.58 0.050 45);
  }
  html[data-atmos="dawn"] {
    --bg-deep: oklch(0.92 0.008 90);
    --bg-mid:  oklch(0.95 0.006 90);
    --bg-soft: oklch(0.97 0.005 90);
    --ink:     oklch(0.30 0.010 60);
    --ink-mute: oklch(0.50 0.012 60);
    --ink-faint: oklch(0.72 0.010 60);
    --ember:   oklch(0.62 0.060 40);
    --ember-soft: oklch(0.74 0.040 40);
  }
  html[data-atmos="dawn"] body::after { mix-blend-mode: multiply; opacity: 0.04; }
  html[data-atmos="dawn"] .help-overlay { background: oklch(0.92 0.008 90 / 0.55); }

  @media (max-width: 720px) {
    .breath { width: 280px; height: 280px; }
    .help-card { padding: 40px 32px; }
    .help-title { font-size: 18px; }
  }
</style>
</head>
<body>
  <!-- corner chrome -->
  <div class="chrome"><span class="dot"></span><span class="title">深呼吸している場所</span></div>
  <div class="chrome-right" id="presence-chrome"></div>

  <!-- root for React -->
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
